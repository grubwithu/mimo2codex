server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text payloads.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Hashed assets (Vite emits content hashes) — cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the HTML shell — it references hashed assets.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback: every unknown route → index.html so client routing works
    # after a hard refresh on /docs/<slug>.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sensible defaults
    sendfile on;
    tcp_nopush on;
    server_tokens off;
}
